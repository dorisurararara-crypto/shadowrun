<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<style>
        body { background-color: #0A0A0A; }
    </style>
</head>
<body class="font-body text-on-surface">
<header class="bg-[#131313] flex justify-between items-center w-full px-6 py-4 sticky z-50">
<h1 class="text-2xl font-black tracking-tighter text-[#ffb3b4] font-['Space_Grotesk'] uppercase">SHADOW RUN</h1>
<div class="flex gap-4 items-center">
<button class="text-neutral-500 hover:text-white"><span class="material-symbols-outlined text-2xl">history</span></button>
<button class="text-neutral-500 hover:text-white"><span class="material-symbols-outlined text-2xl">settings</span></button>
</div>
</header>
<main class="px-6 py-8 space-y-8 min-h-screen pb-32">
<section class="bg-[#161616] rounded-xl p-6 border border-white/5">
<div class="grid grid-cols-2 gap-y-6 gap-x-4">
<div class="space-y-1">
<p class="text-[10px] font-bold tracking-[0.1em] uppercase text-[#ff5262]">Total Distance</p>
<p class="text-2xl font-headline font-bold text-on-surface">0.0<span class="text-sm font-normal text-neutral-500 ml-1">km</span></p>
</div>
<div class="space-y-1">
<p class="text-[10px] font-bold tracking-[0.1em] uppercase text-[#ff5262]">Total Runs</p>
<p class="text-2xl font-headline font-bold text-on-surface">0</p>
</div>
<div class="space-y-1">
<p class="text-[10px] font-bold tracking-[0.1em] uppercase text-[#ff5262]">Record</p>
<p class="text-2xl font-headline font-bold text-on-surface">0W <span class="text-neutral-500">0L</span></p>
</div>
<div class="space-y-1">
<p class="text-[10px] font-bold tracking-[0.1em] uppercase text-[#ff5262]">Streak</p>
<p class="text-2xl font-headline font-bold text-on-surface">0</p>
</div>
</div>
</section>
<section class="bg-[#161616] rounded-xl overflow-hidden relative">
<div class="absolute inset-y-0 left-0 w-1 bg-gradient-to-b from-[#ffb3b4] to-[#ff5262]"></div>
<div class="p-5 flex justify-between items-center">
<div class="flex items-center gap-4">
<div class="w-12 h-12 bg-[#353534] rounded-lg flex items-center justify-center text-[#ffb3b4]">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">local_fire_department</span>
</div>
<div>
<h3 class="font-headline font-bold text-lg tracking-tight text-white uppercase">Today's Challenge</h3>
<p class="text-xs text-neutral-500 font-medium">Daily Objective</p>
</div>
</div>
<div class="text-right">
<p class="text-[10px] uppercase tracking-widest font-bold text-neutral-500 mb-1">Remaining</p>
<p class="text-xl font-headline font-black text-[#ff5262]">3/3</p>
</div>
</div>
</section>
<section class="space-y-4">
<div class="flex justify-between items-end">
<h2 class="text-sm font-headline font-bold text-neutral-400 tracking-widest uppercase">Recent Runs</h2>
<span class="h-[1px] flex-grow mx-4 bg-white/5"></span>
</div>
<div class="flex flex-col items-center justify-center py-20 border-2 border-dashed border-white/5 rounded-xl">
<div class="w-16 h-16 rounded-full bg-[#161616] flex items-center justify-center mb-4 text-neutral-700">
<span class="material-symbols-outlined text-4xl">directions_run</span>
</div>
<p class="text-neutral-500 font-medium text-center max-w-[200px] leading-relaxed">
No runs yet.<br/><span class="text-neutral-400">Wake up your shadow.</span>
</p>
</div>
</section>
</main>
<nav class="fixed bottom-0 left-0 w-full z-50 bg-[#131313]/90 backdrop-blur-md border-t border-white/5 flex justify-around items-center px-6 pb-8 pt-4">
<div class="flex w-full gap-4">
<button class="flex-1 flex flex-col items-center justify-center bg-gradient-to-br from-[#ffb3b4] to-[#ff5262] text-black rounded-full px-6 py-4">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-xl">directions_run</span>
<span class="font-black text-xs tracking-widest uppercase">New Run</span>
</div>
</button>
<button class="flex-1 flex flex-col items-center justify-center border border-[#ff5262] text-[#ffb3b4] rounded-full px-6 py-4">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-xl">workspace_premium</span>
<span class="font-black text-xs tracking-widest uppercase text-neutral-300">Challenge</span>
</div>
</button>
</div>
</nav>
</body></html>
