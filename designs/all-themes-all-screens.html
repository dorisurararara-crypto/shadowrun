<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shadow Run — 5 Themes × 6 Screens</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,700;1,400;1,700&family=Gowun+Batang:wght@400;700&family=Nanum+Myeongjo:wght@400;700;800&family=Noto+Serif+KR:wght@200;400;500;700;900&family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=Space+Grotesk:wght@400;500;700;900&family=Inter:wght@100;200;300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;700&family=Oswald:wght@200;400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #050507;
    color: #eaeaea;
    font-family: 'Pretendard', sans-serif;
    min-height: 100vh;
    padding: 40px 20px 80px;
  }
  .master-header { max-width: 1400px; margin: 0 auto 48px; text-align: center; }
  .master-header h1 {
    font-family: 'Playfair Display', serif;
    font-weight: 900;
    font-size: 46px;
    letter-spacing: -0.02em;
  }
  .master-header h1 em { font-style: italic; color: #ff6b7e; font-weight: 400; }
  .master-header p { color: #888; font-size: 14px; line-height: 1.6; max-width: 760px; margin: 12px auto 0; }
  .master-header nav {
    display: flex; justify-content: center; gap: 8px; margin-top: 20px; flex-wrap: wrap;
  }
  .master-header nav a {
    padding: 8px 14px;
    border: 1px solid #2a2a2e;
    border-radius: 999px;
    color: #aaa;
    font-size: 12px;
    text-decoration: none;
    letter-spacing: 0.05em;
  }
  .master-header nav a:hover { border-color: #ff6b7e; color: #ff6b7e; }

  /* ============ 테마 섹션 ============ */
  .theme-section {
    max-width: 1400px;
    margin: 0 auto 72px;
    padding: 32px 24px 40px;
    border-top: 1px solid #1a1a1d;
  }
  .theme-title {
    display: flex;
    align-items: baseline;
    gap: 16px;
    margin-bottom: 8px;
    flex-wrap: wrap;
  }
  .theme-num {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: 14px;
    color: #ff6b7e;
    letter-spacing: 0.25em;
  }
  .theme-name {
    font-family: 'Playfair Display', serif;
    font-weight: 900;
    font-size: 32px;
    letter-spacing: -0.02em;
    color: #fff;
  }
  .theme-price {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    padding: 3px 10px;
    border-radius: 4px;
    letter-spacing: 0.1em;
  }
  .price-free { background: rgba(107, 217, 199, 0.1); color: #6BD9C7; border: 1px solid rgba(107, 217, 199, 0.3); }
  .price-paid { background: rgba(212, 175, 55, 0.1); color: #D4AF37; border: 1px solid rgba(212, 175, 55, 0.3); }
  .theme-desc { color: #888; font-size: 13.5px; line-height: 1.55; max-width: 800px; margin-bottom: 28px; }

  .screens-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 28px 16px;
    justify-items: center;
  }
  @media (max-width: 1100px) { .screens-grid { grid-template-columns: repeat(2, 1fr); } }
  @media (max-width: 700px)  { .screens-grid { grid-template-columns: 1fr; } }

  .screen-card {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
  }
  .screen-name {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: 13px;
    color: #888;
    letter-spacing: 0.15em;
  }

  /* ============ 폰 프레임 공용 ============ */
  .phone {
    width: 300px; height: 620px;
    border-radius: 42px;
    overflow: hidden;
    position: relative;
    box-shadow: 0 20px 50px rgba(0,0,0,0.8), 0 0 0 7px #1a1a1a, 0 0 0 8px #2c2c30;
  }
  .notch {
    position: absolute;
    top: 11px; left: 50%; transform: translateX(-50%);
    width: 104px; height: 26px;
    background: #000;
    border-radius: 20px;
    z-index: 100;
  }
  .screen {
    width: 100%; height: 100%;
    position: relative;
    overflow: hidden;
    background: var(--bg);
    color: var(--fg);
    font-family: var(--bodyFont);
  }
  .statusbar {
    position: absolute; top: 0; left: 0; right: 0;
    padding: 13px 22px 0;
    display: flex; justify-content: space-between;
    font-family: 'Inter', sans-serif;
    font-size: 11.5px;
    font-weight: 600;
    color: var(--fg);
    z-index: 80;
    letter-spacing: -0.02em;
  }

  /* ============ CSS 변수로 테마 토큰 정의 ============ */
  /* T1: Pure Cinematic */
  .t1 {
    --bg: #000;
    --surface: #0a0a0a;
    --card: #0e0e0e;
    --fg: #f5f5f5;
    --fg-dim: #888;
    --fg-fade: #555;
    --accent: #8B0000;
    --accent-soft: #c83030;
    --accent-bg: rgba(139,0,0,0.1);
    --border: #1a1a1a;
    --border-strong: #2a0000;
    --heroFont: 'Playfair Display', serif;
    --bodyFont: 'Noto Serif KR', serif;
    --numFont: 'Playfair Display', serif;
    --labelFont: 'Playfair Display', serif;
  }
  /* T2: Film Noir */
  .t2 {
    --bg: #0D0907;
    --surface: #110C08;
    --card: #150E0A;
    --fg: #E8DCC4;
    --fg-dim: #8a7d5f;
    --fg-fade: #5a4d35;
    --accent: #8B2635;
    --accent-soft: #B89660;
    --accent-bg: rgba(184,150,96,0.08);
    --border: #2a1d10;
    --border-strong: #3a2718;
    --heroFont: 'Cormorant Garamond', serif;
    --bodyFont: 'Cormorant Garamond', serif;
    --numFont: 'Cormorant Garamond', serif;
    --labelFont: 'Oswald', sans-serif;
  }
  /* T3: Korean Mystic Horror */
  .t3 {
    --bg: #050302;
    --surface: #0a0604;
    --card: #0d0607;
    --fg: #F0EBE3;
    --fg-dim: #9a8a7a;
    --fg-fade: #5a4840;
    --accent: #7A0A0E;
    --accent-soft: #c42029;
    --accent-bg: rgba(122,10,14,0.12);
    --border: #2a1518;
    --border-strong: #4a2528;
    --heroFont: 'Nanum Myeongjo', serif;
    --bodyFont: 'Gowun Batang', serif;
    --numFont: 'Nanum Myeongjo', serif;
    --labelFont: 'Nanum Myeongjo', serif;
  }
  /* T4: Editorial Thriller */
  .t4 {
    --bg: #0a0a0a;
    --surface: #111;
    --card: #0e0e0e;
    --fg: #fff;
    --fg-dim: #888;
    --fg-fade: #555;
    --accent: #DC2626;
    --accent-soft: #f87171;
    --accent-bg: rgba(220,38,38,0.08);
    --border: #222;
    --border-strong: #fff;
    --heroFont: 'Playfair Display', serif;
    --bodyFont: 'Inter', sans-serif;
    --numFont: 'Playfair Display', serif;
    --labelFont: 'Inter', sans-serif;
  }
  /* T5: Neo-Noir Cyber */
  .t5 {
    --bg: #04040A;
    --surface: #080812;
    --card: #0a0a18;
    --fg: #E8E8F0;
    --fg-dim: #666;
    --fg-fade: #3a3a4a;
    --accent: #FF1744;
    --accent-soft: #ff5a75;
    --accent-bg: rgba(255,23,68,0.08);
    --blue: #4DD0E1;
    --blue-dim: rgba(77,208,225,0.15);
    --border: rgba(77,208,225,0.12);
    --border-strong: #FF1744;
    --heroFont: 'Playfair Display', serif;
    --bodyFont: 'Inter', sans-serif;
    --numFont: 'JetBrains Mono', monospace;
    --labelFont: 'JetBrains Mono', monospace;
  }
  /* 테마별 배경 질감 */
  .t1 .screen {
    background:
      radial-gradient(ellipse 400px 300px at 50% 0%, rgba(139,0,0,0.1), transparent 60%),
      #000;
  }
  .t2 .screen {
    background:
      radial-gradient(ellipse at 30% 20%, rgba(184,150,96,0.04), transparent 50%),
      #0D0907;
  }
  .t2 .screen::before {
    content: '';
    position: absolute; inset: 0;
    background: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2'/><feColorMatrix values='0 0 0 0 0.7 0 0 0 0 0.6 0 0 0 0 0.4 0 0 0 0.06 0'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
    pointer-events: none;
    mix-blend-mode: overlay;
    opacity: 0.5;
    z-index: 1;
  }
  .t3 .screen { background: #050302; }
  .t3 .screen::after {
    content: '影';
    position: absolute;
    top: 18%; right: -30px;
    font-family: 'Nanum Myeongjo', serif;
    font-size: 240px;
    color: rgba(122,10,14,0.12);
    line-height: 1;
    pointer-events: none;
    z-index: 1;
  }
  .t5 .screen {
    background:
      radial-gradient(ellipse at 80% 0%, rgba(255,23,68,0.16), transparent 55%),
      radial-gradient(ellipse at 0% 80%, rgba(77,208,225,0.06), transparent 55%),
      #04040A;
  }
  .t5 .screen::before {
    content: '';
    position: absolute; inset: 0;
    background: repeating-linear-gradient(0deg, transparent 0, transparent 3px, rgba(77,208,225,0.02) 3px, rgba(77,208,225,0.02) 4px);
    pointer-events: none;
    z-index: 1;
  }

  /* ============ 공용 레이아웃 ============ */
  .body { padding: 44px 20px 14px; position: relative; z-index: 10; height: 100%; overflow-y: auto; }
  .body::-webkit-scrollbar { display: none; }

  /* 헤더 */
  .h-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 12px;
  }
  .eyebrow {
    font-family: var(--labelFont);
    font-size: 10px;
    color: var(--accent-soft);
    letter-spacing: 0.3em;
    text-transform: uppercase;
    font-style: italic;
  }
  .t2 .eyebrow, .t4 .eyebrow, .t5 .eyebrow { font-style: normal; }
  .icons {
    display: flex;
    gap: 8px;
  }
  .ico {
    width: 28px; height: 28px;
    border-radius: 8px;
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    color: var(--fg-dim);
    font-size: 14px;
  }
  .logo {
    font-family: var(--heroFont);
    font-weight: 900;
    font-size: 30px;
    letter-spacing: -0.03em;
    line-height: 1;
    color: var(--fg);
    margin-bottom: 4px;
  }
  .t3 .logo { font-size: 26px; letter-spacing: 0.04em; }
  .t5 .logo { font-style: italic; text-shadow: 0 0 16px rgba(255,23,68,0.4); }
  .logo em { color: var(--accent); font-style: inherit; }
  .sub {
    font-family: var(--labelFont);
    font-size: 10px;
    color: var(--fg-fade);
    letter-spacing: 0.3em;
    text-transform: uppercase;
    margin-bottom: 14px;
  }

  /* 인용구 */
  .quote {
    font-family: var(--bodyFont);
    font-size: 14px;
    line-height: 1.6;
    color: var(--fg);
    margin: 6px 0 14px;
    padding: 2px 0;
  }
  .t1 .quote, .t2 .quote, .t3 .quote { text-align: center; }
  .t4 .quote { font-family: 'Playfair Display', serif; font-size: 17px; line-height: 1.3; }
  .t5 .quote { padding-left: 12px; border-left: 2px solid var(--accent); }
  .quote em, .quote strong {
    font-family: var(--numFont);
    font-style: italic;
    color: var(--accent);
    font-weight: 700;
  }
  .quote-by {
    font-family: var(--labelFont);
    font-size: 9.5px;
    color: var(--fg-fade);
    letter-spacing: 0.3em;
    margin-top: 6px;
    text-align: center;
    text-transform: uppercase;
  }
  .t5 .quote-by { text-align: left; color: var(--blue, var(--accent-soft)); }

  /* 스탯 */
  .stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1px;
    border-top: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    padding: 10px 0;
    margin-bottom: 14px;
  }
  .stat { text-align: center; padding: 2px 4px; border-right: 1px solid var(--border); }
  .stat:last-child { border-right: none; }
  .stat .v {
    font-family: var(--numFont);
    font-size: 18px;
    font-weight: 700;
    color: var(--fg);
    line-height: 1;
    letter-spacing: -0.02em;
  }
  .t1 .stat .v, .t4 .stat .v { font-weight: 400; }
  .t5 .stat .v { font-style: italic; }
  .stat .v small {
    font-size: 9px;
    color: var(--fg-fade);
    font-weight: 400;
    margin-left: 1px;
  }
  .stat .k {
    font-family: var(--labelFont);
    font-size: 8px;
    color: var(--fg-fade);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin-top: 3px;
  }

  /* 시작 버튼 */
  .start {
    padding: 14px 14px 16px;
    margin-bottom: 14px;
    text-align: center;
    background: var(--accent-bg);
    border: 1px solid var(--accent);
    border-radius: 0;
    position: relative;
  }
  .t4 .start { background: var(--accent); border: none; color: #fff; text-align: left; padding: 16px; }
  .t5 .start {
    background: linear-gradient(135deg, var(--accent) 0%, #aa0028 100%);
    border: 1px solid var(--accent);
    box-shadow: 0 0 20px rgba(255,23,68,0.25);
    color: #fff;
  }
  .t2 .start::before, .t2 .start::after {
    content: ''; position: absolute; width: 14px; height: 14px;
    border: 1px solid var(--accent-soft);
  }
  .t2 .start::before { top: -1px; left: -1px; border-right: none; border-bottom: none; }
  .t2 .start::after { bottom: -1px; right: -1px; border-left: none; border-top: none; }
  .start-tag {
    font-family: var(--labelFont);
    font-size: 9px;
    color: var(--accent-soft);
    letter-spacing: 0.3em;
    text-transform: uppercase;
    margin-bottom: 3px;
    font-style: italic;
  }
  .t4 .start-tag, .t5 .start-tag { color: rgba(255,255,255,0.7); font-style: normal; }
  .start-ttl {
    font-family: var(--heroFont);
    font-weight: 700;
    font-size: 18px;
    color: var(--fg);
    line-height: 1.15;
    letter-spacing: -0.01em;
  }
  .t4 .start-ttl, .t5 .start-ttl { color: #fff; font-style: italic; font-weight: 900; }

  /* 로그 / 리스트 */
  .log-ttl {
    font-family: var(--labelFont);
    font-size: 9.5px;
    color: var(--accent-soft);
    letter-spacing: 0.3em;
    text-transform: uppercase;
    margin-bottom: 6px;
    padding-bottom: 4px;
    border-bottom: 1px solid var(--border);
  }
  .t4 .log-ttl { border-bottom: 2px solid var(--fg); color: var(--accent); }
  .log {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    padding: 7px 0;
    border-bottom: 1px dotted var(--border);
    font-size: 11.5px;
  }
  .log-l {
    color: var(--fg-dim);
    font-family: var(--bodyFont);
  }
  .t2 .log-l { font-style: italic; }
  .log-v {
    font-family: var(--heroFont);
    font-style: italic;
    color: var(--fg);
    font-size: 12px;
  }
  .log-v.ok { color: var(--accent-soft); }
  .log-v.fail { color: var(--accent); }
  .t5 .log-v { font-family: var(--numFont); font-style: normal; font-weight: 700; }

  /* ============ 화면별 특수 스타일 ============ */

  /* PREPARE */
  .prep-card {
    background: var(--card);
    border: 1px solid var(--border);
    padding: 12px;
    margin-bottom: 10px;
  }
  .prep-card-k {
    font-family: var(--labelFont);
    font-size: 9px;
    color: var(--fg-fade);
    letter-spacing: 0.25em;
    text-transform: uppercase;
    margin-bottom: 4px;
  }
  .prep-card-v {
    font-family: var(--heroFont);
    font-size: 14px;
    color: var(--fg);
    font-weight: 700;
  }
  .prep-options {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 6px;
    margin-top: 6px;
  }
  .prep-opt {
    padding: 10px 4px;
    border: 1px solid var(--border);
    text-align: center;
    font-family: var(--bodyFont);
    font-size: 11px;
    color: var(--fg-dim);
  }
  .prep-opt.sel {
    border-color: var(--accent);
    color: var(--accent);
    background: var(--accent-bg);
  }
  .prep-opt small {
    display: block;
    font-family: var(--numFont);
    font-size: 14px;
    color: var(--fg);
    font-style: italic;
    margin-bottom: 3px;
    font-weight: 700;
  }
  .prep-opt.sel small { color: var(--accent); }
  .prep-go {
    margin-top: 14px;
    padding: 20px;
    background: linear-gradient(135deg, var(--accent) 0%, #5b0000 100%);
    text-align: center;
    border: 1px solid var(--accent);
    color: #fff;
  }
  .t5 .prep-go { box-shadow: 0 0 20px rgba(255,23,68,0.3); }
  .prep-go-ttl {
    font-family: var(--heroFont);
    font-style: italic;
    font-weight: 900;
    font-size: 24px;
    color: #fff;
    letter-spacing: -0.01em;
  }
  .prep-go-sub {
    font-family: var(--labelFont);
    font-size: 10px;
    color: rgba(255,255,255,0.8);
    letter-spacing: 0.3em;
    margin-top: 3px;
  }

  /* RUNNING */
  .run-hero {
    text-align: center;
    margin: 20px 0 16px;
  }
  .run-hero-k {
    font-family: var(--labelFont);
    font-size: 10px;
    color: var(--accent-soft);
    letter-spacing: 0.35em;
    text-transform: uppercase;
    margin-bottom: 6px;
    animation: blinkSlow 2s infinite;
  }
  @keyframes blinkSlow { 0%, 60% { opacity: 1; } 61%, 100% { opacity: 0.5; } }
  .run-hero-n {
    font-family: var(--numFont);
    font-size: 80px;
    font-weight: 900;
    color: var(--accent);
    line-height: 0.9;
    letter-spacing: -0.04em;
    text-shadow: 0 0 30px var(--accent-bg);
  }
  .t1 .run-hero-n, .t2 .run-hero-n, .t4 .run-hero-n { font-weight: 700; }
  .t3 .run-hero-n { font-weight: 800; color: var(--accent-soft); }
  .t5 .run-hero-n { font-style: italic; }
  .run-hero-u {
    font-family: var(--labelFont);
    font-size: 11px;
    color: var(--fg-fade);
    letter-spacing: 0.3em;
    text-transform: uppercase;
    margin-top: 4px;
  }
  .run-map {
    height: 110px;
    border: 1px solid var(--border);
    background:
      radial-gradient(circle at 35% 55%, rgba(139,0,0,0.15), transparent 40%),
      linear-gradient(135deg, rgba(255,255,255,0.02), transparent);
    position: relative;
    margin-bottom: 12px;
    overflow: hidden;
  }
  .t5 .run-map {
    background:
      radial-gradient(circle at 35% 55%, rgba(255,23,68,0.2), transparent 40%),
      radial-gradient(circle at 20% 70%, rgba(77,208,225,0.1), transparent 40%);
  }
  .run-map::before {
    content: '';
    position: absolute; inset: 0;
    background:
      linear-gradient(90deg, transparent 49%, rgba(255,255,255,0.03) 50%, transparent 51%),
      linear-gradient(0deg, transparent 49%, rgba(255,255,255,0.03) 50%, transparent 51%);
    background-size: 24px 24px;
  }
  .dot-me {
    position: absolute;
    left: 35%; top: 55%;
    width: 10px; height: 10px;
    background: #fff;
    border-radius: 50%;
    box-shadow: 0 0 0 3px rgba(255,255,255,0.3);
  }
  .dot-him {
    position: absolute;
    left: 20%; top: 70%;
    width: 8px; height: 8px;
    background: var(--accent);
    border-radius: 50%;
    box-shadow: 0 0 0 3px rgba(139,0,0,0.3), 0 0 18px var(--accent);
    animation: pulseRed 0.9s infinite;
  }
  @keyframes pulseRed {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.25); }
  }
  .run-pause {
    position: absolute;
    left: 50%; bottom: 20px;
    transform: translateX(-50%);
    width: 54px; height: 54px;
    border-radius: 50%;
    background: var(--accent-bg);
    border: 1px solid var(--accent);
    display: flex; align-items: center; justify-content: center;
    color: var(--accent);
    font-size: 20px;
    font-weight: 700;
  }

      ${topDeco(t, t==='t2'?'Profile · Agent':t==='t3'?'설 정':t==='t4'?'Account':'USER · SYS')}
      <div class="logo" style="font-size:22px; margin-top:6px;">설정</div>

      <div class="set-profile">
        <div class="set-avatar">S</div>
        <div style="flex:1;">
          <div class="set-name">도리 · Shadow Runner</div>
          <div class="set-pro">◆ PRO · 멤버</div>
        </div>
      </div>

      <div class="set-sec-ttl">◆ Appearance</div>
      <div class="set-row">
        <span class="set-row-l">테마</span>
        <span class="set-row-v"><span class="dot"></span>${t==='t1'?'Pure Cinematic':t==='t2'?'Film Noir':t==='t3'?'Korean Mystic':t==='t4'?'Editorial':'Neo-Noir Cyber'} ›</span>
      </div>
      <div class="set-row">
        <span class="set-row-l">언어</span>
        <span class="set-row-v">한국어 ›</span>
      </div>

      <div class="set-sec-ttl">◆ Audio</div>
      <div class="set-row"><span class="set-row-l">음성 안내</span><span class="set-row-v">ON</span></div>
      <div class="set-row"><span class="set-row-l">효과음 · 진동</span><span class="set-row-v">ON</span></div>
      <div class="set-row"><span class="set-row-l">배경음</span><span class="set-row-v">70%</span></div>

      <div class="set-sec-ttl">◆ Game</div>
      <div class="set-row"><span class="set-row-l">기본 도플갱어 속도</span><span class="set-row-v">보통 ›</span></div>
      <div class="set-row"><span class="set-row-l">목표 설정</span><span class="set-row-v">주 3회 ›</span></div>

      <div class="set-sec-ttl">◆ Support</div>
      <div class="set-row"><span class="set-row-l">리뷰 남기기</span><span class="set-row-v">›</span></div>
      <div class="set-row"><span class="set-row-l">이용약관</span><span class="set-row-v">›</span></div>
      <div class="set-row"><span class="set-row-l">개인정보처리방침</span><span class="set-row-v">›</span></div>

      <div class="set-version">v 1.0.0 · build 12 · tap ×7 to unlock</div>
    </div>
  </div>`;
}

const screenList = [
  { id:'home',     name:'Home',     fn: screenHome },
  { id:'prepare',  name:'Prepare',  fn: screenPrepare },
  { id:'running',  name:'Running',  fn: screenRunning },
  { id:'result',   name:'Result',   fn: screenResult },
  { id:'history',  name:'History',  fn: screenHistory },
  { id:'settings', name:'Settings', fn: screenSettings },
];

const root = document.getElementById('root');
themes.forEach(T => {
  const sec = document.createElement('div');
  sec.className = 'theme-section';
  sec.id = T.id;
  sec.innerHTML = `
    <div class="theme-title">
      <div class="theme-num">${T.num}</div>
      <div class="theme-name">${T.name}</div>
      <div class="theme-price ${T.priceClass}">${T.price}</div>
    </div>
    <div class="theme-desc">${T.desc}</div>
    <div class="screens-grid"></div>
  `;
  const grid = sec.querySelector('.screens-grid');
  screenList.forEach(sc => {
    const card = document.createElement('div');
    card.className = 'screen-card';
    card.innerHTML = `
      <div class="phone ${T.id}">
        <div class="notch"></div>
        ${sc.fn(T.id)}
      </div>
      <div class="screen-name">${sc.name}</div>
    `;
    grid.appendChild(card);
  });
  root.appendChild(sec);
});
</script>

</body>
</html>
