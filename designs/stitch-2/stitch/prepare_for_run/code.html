<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>

                    "on-primary": "#680016",

                    "inverse-on-surface": "#313030",
                    "secondary": "#ffb3b4",
                    "on-tertiary": "#003731",
                    "surface-container-high": "#2a2a2a",
                    "primary-fixed-dim": "#ffb3b4",
                    "outline-variant": "#5e3e3f",
                    "on-tertiary-fixed": "#00201c",
                    "outline": "#af8787",
                    "surface-tint": "#ffb3b4",
                    "on-surface-variant": "#e9bcbb",
                    "on-error-container": "#ffdad6",
                    "on-tertiary-container": "#00302a",
                    "on-background": "#e5e2e1",
                    "background": "#131313",
                    "surface-bright": "#3a3939",
                    "error": "#ffb4ab",
                    "tertiary-fixed": "#89f5e3",
                    "primary-container": "#ff5262",
                    "on-secondary": "#680016",
                    "on-primary-fixed-variant": "#920023",
                    "on-primary-fixed": "#40000a",

                    "primary-fixed": "#ffdad9",
                    "tertiary-fixed-dim": "#6bd9c7",
                    "surface-container": "#201f1f",
                    "on-surface": "#e5e2e1",
                    "error-container": "#93000a",
                    "secondary-fixed": "#ffdad9",
                    "inverse-primary": "#bf0030",
                    "tertiary-container": "#2aa192",
                    "surface": "#131313",
                    "surface-container-highest": "#353534",
                    "tertiary": "#6bd9c7",

            "borderRadius": {

                    "full": "9999px"

            "fontFamily": {
                    "headline": ["Space Grotesk"],
                    "body": ["Inter"],
                    "label": ["Inter"]

        },
      }

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .bleed-gradient {
            background: linear-gradient(135deg, #ffb3b4 0%, #ff5262 100%);
        }
        body {
            background-color: #131313;
            color: #e5e2e1;
            font-family: 'Inter', sans-serif;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="flex flex-col min-h-screen max-w-[390px] mx-auto overflow-x-hidden relative">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 flex items-center justify-between px-6 h-16 w-full bg-[#131313]">
<div class="flex items-center gap-4">
<button class="hover:bg-[#353534] transition-colors active:scale-95 duration-150 p-2 rounded-full">
<span class="material-symbols-outlined text-[#ffb3b4]">arrow_back</span>
</button>
<h1 class="text-xl font-black tracking-tighter text-[#ffb3b4] font-['Space_Grotesk'] tracking-tight uppercase font-bold">PREP</h1>
</div>
<div class="w-10"></div> <!-- Balance spacer -->
</header>
<!-- Main Canvas -->
<main class="flex-1 pt-24 pb-32 px-6 flex flex-col items-center">
<!-- Large Dark Hero Card -->
<div class="w-full bg-[#1c1b1b] rounded-xl p-8 mb-8 border border-white/5 relative overflow-hidden group">
<!-- Background Texture Bleed -->
<div class="absolute top-0 right-0 w-32 h-32 bg-primary/5 rounded-full blur-3xl -mr-16 -mt-16"></div>
<div class="relative z-10 flex flex-col items-center text-center">
<div class="w-16 h-16 rounded-full bg-tertiary-container/20 flex items-center justify-center mb-6">
<span class="material-symbols-outlined text-tertiary text-4xl" data-icon="directions_run">directions_run</span>
</div>
<h2 class="text-3xl font-headline font-bold text-on-surface mb-2 tracking-tight">New Run</h2>
<p class="text-on-surface-variant/60 font-body text-sm max-w-[200px] leading-relaxed">
                    Leave a new record. The shadow watches.
                </p>
</div>
</div>
<!-- GPS Status Chip -->
<div class="inline-flex items-center gap-2 px-4 py-2 bg-tertiary-container/10 border border-tertiary-container/20 rounded-full mb-12">
<span class="material-symbols-outlined text-tertiary text-sm" style="font-variation-settings: 'FILL' 1;">sensors</span>
<span class="text-tertiary font-label text-xs font-bold tracking-widest uppercase">GPS Signal Good</span>
</div>
<!-- Preparation Bento Grid (Subtle) -->
<div class="w-full grid grid-cols-2 gap-4">
<div class="bg-surface-container-low p-5 rounded-xl flex flex-col gap-3 border border-white/5">
<span class="text-[10px] font-bold text-on-surface-variant/40 tracking-widest uppercase">LAST PACE</span>
<div class="flex items-baseline gap-1">
<span class="text-2xl font-headline font-bold text-on-surface">5:42</span>
<span class="text-xs text-on-surface-variant/60 font-body">/km</span>
</div>
</div>
<div class="bg-surface-container-low p-5 rounded-xl flex flex-col gap-3 border border-white/5">
<span class="text-[10px] font-bold text-on-surface-variant/40 tracking-widest uppercase">THREAT LEVEL</span>
<div class="flex items-baseline gap-1">
<span class="text-2xl font-headline font-bold text-primary">HIGH</span>
</div>
</div>
</div>
<!-- Map Preview / Contextual Visual -->
<div class="mt-8 w-full h-48 rounded-xl overflow-hidden relative border border-white/5">
<img class="w-full h-full object-cover grayscale opacity-60" data-alt="top-down cinematic map view of urban city streets at night with glowing red neon path and dark moody contrast" src="https://lh3.googleusercontent.com/aida-public/AB6AXuD972uTAnIqyjOoCGehWKIuYcpfOnHUZdD3Jy88IXZ5DAJLaRa2W0887x5IDzwCCH7D2G9gqEGSoXbebUWG_U6xhbuwrlU_z5y1u4e2_okrwDkpgFcvaUpykU6CRPdF_tBEx1BOz3chKOXu0aWQgDjU7iUk47qo_3zpbegRfaZcIH1IrOjwsUIKqzdFyrDDAsSyEfnIrU_pCyo34Gr-pkxQshtKZWS3pUBUNmbIfIBHWohjLy_3OC0w4c466Po35TK24k5XkNHmYM9E"/>
<div class="absolute inset-0 bg-gradient-to-t from-[#131313] via-transparent to-transparent"></div>
<div class="absolute bottom-4 left-4">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-primary text-xs" data-icon="location_on">location_on</span>
<span class="text-[10px] font-bold text-on-surface tracking-widest uppercase">SHADOW DISTRICT VII</span>
</div>
</div>
</div>
</main>
<!-- Fixed Start Action Area -->
<div class="fixed bottom-20 w-full px-6 py-6 z-50">
<button class="w-full bleed-gradient h-16 rounded-full flex items-center justify-center gap-3 active:scale-95 transition-transform duration-200 shadow-[0_20px_40px_rgba(255,82,98,0.2)]">
<span class="text-on-primary-container font-headline font-bold text-lg tracking-widest uppercase">START</span>
<span class="material-symbols-outlined text-on-primary-container font-bold" data-icon="bolt">bolt</span>
</button>
</div>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 w-full z-50 pb-safe bg-[#131313]/80 backdrop-blur-xl border-t border-white/5 flex justify-around items-center h-20 px-4 shadow-[0_-20px_40px_rgba(0,0,0,0.4)]">
<a class="flex flex-col items-center justify-center text-[#e5e2e1]/60 px-5 py-1 hover:text-[#ffb3b4] active:scale-90 transition-transform duration-200" href="#">
<span class="material-symbols-outlined" data-icon="history">history</span>
<span class="font-['Inter'] text-[10px] font-bold tracking-widest uppercase">RECORDS</span>
</a>
<a class="flex flex-col items-center justify-center text-[#e5e2e1]/60 px-5 py-1 hover:text-[#ffb3b4] active:scale-90 transition-transform duration-200" href="#">
<span class="material-symbols-outlined" data-icon="directions_run">directions_run</span>
<span class="font-['Inter'] text-[10px] font-bold tracking-widest uppercase">RUN</span>
</a>
<a class="flex flex-col items-center justify-center bg-gradient-to-br from-[#ffb3b4] to-[#ff5262] text-[#131313] rounded-full px-5 py-1 active:scale-90 transition-transform duration-200" href="#">
<span class="material-symbols-outlined" data-icon="settings_input_component">settings_input_component</span>
<span class="font-['Inter'] text-[10px] font-bold tracking-widest uppercase">PREP</span>
</a>
</nav>
</body></html>
