<!DOCTYPE html>

                        "on-surface": "#e5e2e1",

<style>
        body { background-color: #0A0A0A; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="font-body text-on-surface selection:bg-primary-container selection:text-on-primary-container">
<!-- TopAppBar -->
<header class="bg-[#131313] dark:bg-[#131313] docked full-width top-0 bg-neutral-900 flat no shadows flex justify-between items-center w-full px-6 py-4 sticky z-50">
<h1 class="text-2xl font-black tracking-tighter text-[#ffb3b4] font-['Space_Grotesk'] uppercase headline-sm">SHADOW RUN</h1>
<div class="flex gap-4 items-center">
<button class="active:scale-95 duration-200 transition-colors text-neutral-500 hover:text-white" title="History">
<span class="material-symbols-outlined text-2xl">history</span>
</button>
<button class="active:scale-95 duration-200 transition-colors text-neutral-500 hover:text-white" title="Settings">
<span class="material-symbols-outlined text-2xl">settings</span>
</button>
</div>
</header>
<main class="px-6 py-8 space-y-8 min-h-screen pb-32">
<!-- Stats Hero Card (First Card) -->
<section class="bg-[#161616] rounded-xl p-6 border border-white/5">
<div class="grid grid-cols-2 gap-y-6 gap-x-4">
<div class="space-y-1">
<p class="text-[10px] font-bold tracking-[0.1em] uppercase text-[#ff5262]">Total Distance</p>
<p class="text-2xl font-headline font-bold text-on-surface">0.0<span class="text-sm font-normal text-neutral-500 ml-1">km</span></p>
</div>
<div class="space-y-1">
<p class="text-[10px] font-bold tracking-[0.1em] uppercase text-[#ff5262]">Total Runs</p>
<p class="text-2xl font-headline font-bold text-on-surface">0</p>
</div>
<div class="space-y-1">
<p class="text-[10px] font-bold tracking-[0.1em] uppercase text-[#ff5262]">Record</p>
<p class="text-2xl font-headline font-bold text-on-surface">0W <span class="text-neutral-500">0L</span></p>
</div>
<div class="space-y-1">
<p class="text-[10px] font-bold tracking-[0.1em] uppercase text-[#ff5262]">Streak</p>
<p class="text-2xl font-headline font-bold text-on-surface">0</p>
</div>
</div>
</section>
<!-- Today's Challenge (Second Card) -->
<section class="bg-[#161616] rounded-xl overflow-hidden relative group active:scale-[0.98] transition-transform duration-200">
<div class="absolute inset-y-0 left-0 w-1 bg-gradient-to-b from-[#ffb3b4] to-[#ff5262]"></div>
<div class="p-5 flex justify-between items-center">
<div class="flex items-center gap-4">
<div class="w-12 h-12 bg-surface-container-highest rounded-lg flex items-center justify-center text-[#ffb3b4]">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">local_fire_department</span>
</div>
<div>
<h3 class="font-headline font-bold text-lg tracking-tight text-on-surface uppercase">Today's Challenge</h3>
<p class="text-xs text-neutral-500 font-medium">Daily Objective</p>
</div>
</div>
<div class="text-right">
<p class="text-[10px] uppercase tracking-widest font-bold text-neutral-500 mb-1">Remaining</p>
<p class="text-xl font-headline font-black text-[#ff5262]">3/3</p>
</div>
</div>
</section>
<!-- Recent Runs Section -->
<section class="space-y-4">
<div class="flex justify-between items-end">
<h2 class="text-sm font-headline font-bold text-neutral-400 tracking-widest uppercase">Recent Runs</h2>
<span class="h-[1px] flex-grow mx-4 bg-white/5"></span>
</div>
<!-- Empty State -->
<div class="flex flex-col items-center justify-center py-20 border-2 border-dashed border-white/5 rounded-xl">
<div class="w-16 h-16 rounded-full bg-[#161616] flex items-center justify-center mb-4 text-neutral-700">
<span class="material-symbols-outlined text-4xl">directions_run</span>
</div>
<p class="text-neutral-500 font-medium text-center max-w-[200px] leading-relaxed">
                    No runs yet. <br/>
<span class="text-neutral-400">Wake up your shadow.</span>
</p>
</div>
</section>
<!-- Asymmetric Map Preview Decorative -->
<div class="relative w-full h-48 bg-neutral-900 rounded-xl overflow-hidden grayscale opacity-30 pointer-events-none">
<img class="w-full h-full object-cover" data-alt="abstract dark satellite map view of city streets at night with minimal red pulse lights along paths" src="https://lh3.googleusercontent.com/aida-public/AB6AXuARBZXh7Fd_B_P17FR3i-vpx67iF-oG7Yo47SmyLr1Aokogs8nomROGbdQPW6OZBsVwEr7jnHBKmGSjzdcfGUMXWRjM-Xpa1ku6l3QR18XQtZP1ORyY27UKr1xwRpmzGga7DFvnxfJNSzKsH8IHAHcGbqI4_pUFPFuMUD7FGkhlcC3O38YZK-iodP8dyXw9HjSaC1K4KGtbZaJu1nhXAHUY3CmwObWvWe0OCPUWCqF5MOgWO78KhCdZWzgUWIcblLtUkPVELxxOPo-N"/>
<div class="absolute inset-0 bg-gradient-to-t from-[#0A0A0A] via-transparent to-transparent"></div>
</div>
</main>
<!-- BottomNavBar as Buttons -->
<nav class="fixed bottom-0 left-0 w-full z-50 bg-[#131313]/90 dark:bg-[#131313]/90 backdrop-blur-md border-t border-white/5 flex justify-around items-center px-6 pb-8 pt-4">
<div class="flex w-full gap-4">
<!-- New Run (Active/Primary) -->
<button class="flex-1 flex flex-col items-center justify-center bg-gradient-to-br from-[#ffb3b4] to-[#ff5262] text-black rounded-full px-6 py-4 active:scale-95 transition-transform duration-300">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-xl">directions_run</span>
<span class="font-['Inter'] font-black text-xs tracking-widest uppercase">New Run</span>
</div>
</button>
<!-- Challenge (Inactive/Outline) -->
<button class="flex-1 flex flex-col items-center justify-center border border-[#ff5262] text-[#ffb3b4] rounded-full px-6 py-4 active:scale-95 transition-transform duration-300">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-xl">workspace_premium</span>
<span class="font-['Inter'] font-black text-xs tracking-widest uppercase text-neutral-300">Challenge</span>
</div>
</button>
</div>
</nav>
</body></html>
