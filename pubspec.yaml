name: shadowrun
description: "SHADOW RUN — 도플갱어 추격 러닝앱"
publish_to: 'none'
version: 1.0.0+25

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_riverpod: ^3.3.1
  go_router: ^17.2.0
  sqflite: ^2.4.2
  path: ^1.9.1
  geolocator: ^14.0.2
  flutter_naver_map: ^1.4.4
  just_audio: ^0.9.43
  audio_session: ^0.1.21
  flutter_tts: ^4.2.1
  vibration: ^2.0.1
  wakelock_plus: ^1.5.1
  google_mobile_ads: ^5.3.0
  in_app_purchase: ^3.2.0
  shared_preferences: ^2.3.4
  intl: ^0.20.2
  google_fonts: ^6.2.1
  fl_chart: ^0.70.2
  share_plus: ^10.1.4
  permission_handler: ^11.4.0
  http: ^1.6.0
  image_picker: ^1.1.2
  path_provider: ^2.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"
  min_sdk_android: 21
  remove_alpha_ios: true
  adaptive_icon_background: "#0A0A0A"
  adaptive_icon_foreground: "assets/icon/app_icon.png"

flutter:
  uses-material-design: true

  assets:
    - assets/audio/
    - assets/audio/preview/
    - assets/audio/sfx/
    - assets/audio/themes/
    - assets/audio/voice/
    - assets/icon/
